services:
  moovair2mqtt:
    image: ghcr.io/saxophone-k/moovair2mqtt:latest
    restart: unless-stopped
    environment:
      # ── Moovair account (required) ─────────────────────────────────────
      M2M_MOOVAIR_USERNAME: "your.email@example.com"
      M2M_MOOVAIR_PASSWORD: "your_password"

      # ── MQTT broker (required) ─────────────────────────────────────────
      M2M_MQTT_HOST: "192.168.1.x"     # IP of your MQTT broker
      M2M_MQTT_PORT: "1883"
      # M2M_MQTT_USERNAME: ""           # if your broker requires auth
      # M2M_MQTT_PASSWORD: ""

      # ── Options (optional) ────────────────────────────────────────────
      M2M_POLL_INTERVAL: "5"            # seconds between each poll (min recommended: 5)
      M2M_MQTT_TOPIC_PREFIX: "moovair2mqtt"
      M2M_LOG_LEVEL: "info"             # debug, info, warning, error
